name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      - name: Sign installer
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          exe=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          echo "Signing: $exe"
          npm run tauri -- signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "" "$exe"
          echo "EXE_PATH=$exe" >> $GITHUB_ENV
          echo "SIG_PATH=${exe}.sig" >> $GITHUB_ENV

      - name: Generate latest.json and create release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $exePath = $env:EXE_PATH
          $sigPath = $env:SIG_PATH
          $exeName = Split-Path $exePath -Leaf
          $sig     = (Get-Content $sigPath -Raw).Trim()
          $repo    = "Joey-Farah/Slippi-Ranked-Stats"
          $encoded = $exeName -replace ' ', '.'
          $url     = "https://github.com/$repo/releases/download/$tag/$encoded"
          $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")

          $json = [ordered]@{
            version  = $version
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = $url
              }
            }
          } | ConvertTo-Json -Depth 5

          $json | Out-File -FilePath latest.json -Encoding utf8NoBOM

          Write-Host "=== latest.json ==="
          Write-Host $json

          gh release delete $tag --yes 2>$null
          gh release create $tag `
            --title "Slippi Ranked Stats $tag" `
            --notes-file release-notes.md `
            "$exePath" `
            latest.json
